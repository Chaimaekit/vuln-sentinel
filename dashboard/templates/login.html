{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="card-title">Sign in</div>
  <div class="card-sub">Enter your admin credentials to access the security dashboard.</div>
  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input name="username" placeholder="admin" required autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button class="btn" type="submit">Sign in to dashboard</button>
  </form>
</div>
<div class="hint">Forgot password? Delete <code>vs_users.json</code> to reset.</div>
{% endblock %}
