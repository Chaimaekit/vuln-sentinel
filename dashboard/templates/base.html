<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VulnSentinel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" id="fav" type="image/svg+xml">
  <style>
    :root {
      --bg: #ffffff; --bg-off: #f7f7f5; --bg-card: #f2f2f0; --border: #e0e0dc;
      --black: #0a0a0a; --gray-mid: #6b6b6b; --gray-lo: #9a9a9a;
      --red: #c42b2b; --green: #1f7035;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'Inter', sans-serif; background: var(--bg);
      color: var(--black); font-size: 14px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .wrap { width: 100%; max-width: 400px; padding: 0 24px; }
    .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
    .logo-name {
      font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 700;
      letter-spacing: -0.2px; color: var(--black);
    }
    .setup-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--gray-mid); margin-bottom: 28px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
    .card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 32px;
    }
    .card-title {
      font-family: 'DM Sans', sans-serif; font-size: 22px; font-weight: 700;
      letter-spacing: -0.4px; margin-bottom: 6px;
    }
    .card-sub { font-size: 13px; color: var(--gray-mid); margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--gray-lo); margin-bottom: 7px;
    }
    .field input {
      width: 100%; background: var(--bg-off); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; font-family: 'Inter', sans-serif;
      font-size: 14px; color: var(--black); outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--black); }
    .field input::placeholder { color: var(--gray-lo); }
    .btn {
      width: 100%; background: var(--black); border: none; color: #fff;
      padding: 12px; border-radius: 8px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.78; }
    .hint { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray-mid); }
    .hint code {
      font-family: 'Courier New', monospace; font-size: 12px;
      background: var(--bg-card); padding: 1px 5px; border-radius: 3px;
    }
    .error-box {
      background: rgba(196,43,43,0.08); border: 1px solid rgba(196,43,43,0.22);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: var(--red); margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
      <path d="M17 2L3 8.5v9.5c0 7.5 5.8 13.8 14 15.5C25.2 31.8 31 25.5 31 18V8.5L17 2z" fill="#0a0a0a"/>
    </svg>
    <span class="logo-name">VulnSentinel</span>
  </div>
  {% block content %}{% endblock %}
</div>
<script>
  (function() {
    var fav = document.getElementById('fav');
    if (fav) fav.href = 'data:image/svg+xml,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">' +
      '<path d="M16 2L3 8v9.5C3 25 8.5 30.8 16 32.5 23.5 30.8 29 25 29 17.5V8L16 2z" fill="%230a0a0a"/>' +
      '</svg>');
  })();
</script>
</body>
</html>
